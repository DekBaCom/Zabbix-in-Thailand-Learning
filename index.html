<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zabbix Learning Center | Zabbix in Thailand</title>
    <meta name="description"
        content="ศูนย์การเรียนรู้ Zabbix โดยกลุ่ม Zabbix in Thailand รวมวิดีโอสอนและ Workshop ล่าสุด">
    <link rel="stylesheet" href="styles.css">
    <!-- Ionicons for better UI icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>

    <header id="main-header">
        <div class="logo-container">
            <div class="logo-text"><span>Zabbix</span> Learning</div>
        </div>
        <nav>
            <a href="#">Home</a>
            <div class="nav-dropdown">
                <a href="#" class="dropdown-trigger">Categories <ion-icon name="chevron-down-outline"></ion-icon></a>
                <div class="dropdown-content" id="categories-dropdown">
                    <!-- Populated by JS -->
                </div>
            </div>
            <a href="https://www.facebook.com/groups/zabbixinthailand" target="_blank">Facebook Group</a>
            <a href="#" class="contribute-btn">Contribute</a>
        </nav>
    </header>

    <!-- Hero Section (Dynamic) -->
    <div id="hero-container" class="hero-netflix">
        <!-- Will be populated by JS -->
    </div>

    <main class="netflix-content">
        <!-- Video Categories (Populated by JS as horizontal sliders) -->
        <div id="content-area"></div>
    </main>

    <footer>
        <p>&copy; 2026 Zabbix in Thailand. Community Driven.</p>
        <p>Built with <span style="color: var(--primary-color);">♥</span> by Antigravity</p>
    </footer>

    <!-- Video Modal -->
    <div class="modal" id="video-modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <button class="close-modal" id="close-modal">
                <ion-icon name="close-outline"></ion-icon>
            </button>
            <div id="player-container"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
